<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Pet Live2D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #stage {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    #status {
      position: fixed;
      left: 8px;
      bottom: 8px;
      color: #ffffff;
      font-size: 12px;
      font-family: "Consolas", "Microsoft YaHei", sans-serif;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
      opacity: 0.85;
      pointer-events: none;
      user-select: none;
      display: none;
    }
  </style>
  <script src="./vendor/pixi.min.js"></script>
  <script>
    if (!window.PIXI) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"><\\/script>');
    }
  </script>
  <script src="./vendor/live2dcubismcore.min.js"></script>
  <script>
    if (!window.Live2DCubismCore) {
      document.write('<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"><\\/script>');
    }
  </script>
  <script src="./vendor/cubism4.min.js"></script>
  <script>
    if (!window.Cubism4InternalModel) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"><\\/script>');
    }
  </script>
  <script src="./vendor/pixi-live2d-display.min.js"></script>
  <script>
    if (!window.PIXI || !window.PIXI.live2d) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"><\\/script>');
    }
  </script>
</head>
<body>
  <div id="stage"></div>
  <div id="status"></div>
  <script src="./pet_live2d.js"></script>
</body>
</html>
